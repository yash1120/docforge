# Self-host: `docker compose up --build` then open http://localhost:8000
# Keys are read from your shell env (or a sibling .env file); both optional —
# without them the explainer + baked /example still work.
services:
  docforge:
    build: .
    image: docforge:local
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DOCFORGE_MAX_PARALLEL=4
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/api/health').status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped
