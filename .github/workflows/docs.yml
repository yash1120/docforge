# The meta-flex: docforge regenerates its own docs/ on every push to main.
# Skips itself when the only changed files are inside docs/ (avoids loops).

name: docs

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - ".docforge/**"
      - "**/*.md"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install docforge
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run docforge on itself
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Single worker in CI — Groq free-tier rate-limits get angry otherwise.
          DOCFORGE_MAX_PARALLEL: "2"
        run: docforge .

      - name: Move generated docs into ./docs
        run: |
          mkdir -p docs
          if [ -d .docforge/docs ]; then
            cp -r .docforge/docs/* docs/
          fi

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs
          if git diff --cached --quiet; then
            echo "no doc changes"
          else
            git commit -m "docs: regenerated by docforge"
            git push
          fi
