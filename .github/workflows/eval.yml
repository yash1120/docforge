# Eval-on-PR — re-runs docforge-eval against the testset on every PR and
# fails the check if any axis regressed by more than 2 percentage points
# vs the baseline scoreboard committed on main.
#
# Needs GROQ_API_KEY + ANTHROPIC_API_KEY in repo secrets.

name: eval

on:
  pull_request:
    paths:
      - "src/docforge/**"
      - "eval/testset/**"
      - "pyproject.toml"
  workflow_dispatch:

jobs:
  scoreboard:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - name: Check API keys present
        run: |
          if [ -z "$GROQ_API_KEY" ] || [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "::warning::GROQ_API_KEY and/or ANTHROPIC_API_KEY not set in repo secrets — skipping eval."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        id: keys

      - name: Set up Python
        if: steps.keys.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        if: steps.keys.outputs.skip != 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e .

      - name: Run eval (PR branch)
        if: steps.keys.outputs.skip != 'true'
        env:
          DOCFORGE_MAX_PARALLEL: "2"
        run: |
          docforge-eval \
            --testset eval/testset \
            --out eval/scoreboard_pr.json

      - name: Fetch baseline scoreboard from main
        if: steps.keys.outputs.skip != 'true'
        run: |
          git fetch origin main --depth 1
          git show origin/main:eval/scoreboard_data.json > eval/scoreboard_main.json \
            || echo '{}' > eval/scoreboard_main.json

      - name: Compare PR vs main, fail on > 2pp regression
        if: steps.keys.outputs.skip != 'true'
        run: |
          python - <<'PY'
          import json, sys, pathlib
          pr = json.loads(pathlib.Path("eval/scoreboard_pr.json").read_text())
          base = json.loads(pathlib.Path("eval/scoreboard_main.json").read_text())
          axes = ["factuality_mean", "coverage_mean", "completeness_mean", "readability_mean"]
          pr_s = (pr.get("summary") or {})
          base_s = (base.get("summary") or {})
          if not base_s:
              print("no baseline — skipping regression check (this PR establishes the baseline)")
              sys.exit(0)
          fails = []
          for axis in axes:
              prev = float(base_s.get(axis, 0) or 0)
              now = float(pr_s.get(axis, 0) or 0)
              delta = now - prev
              # Readability is on a 1-5 scale; convert to "percentage points of full range"
              tolerance = 0.02 if axis != "readability_mean" else 0.10  # 2pp / 0.1 of 5
              symbol = "✓" if delta >= -tolerance else "✗"
              print(f"  {symbol} {axis}: {prev:.3f} -> {now:.3f}  ({delta:+.3f})")
              if delta < -tolerance:
                  fails.append(f"{axis} regressed by {-delta:.3f}")
          if fails:
              print("\nREGRESSION:")
              for f in fails: print(f"  {f}")
              sys.exit(1)
          print("\nno regressions outside tolerance")
          PY

      - name: Upload scoreboard artifact
        if: always() && steps.keys.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: scoreboard
          path: |
            eval/scoreboard_pr.json
            eval/scoreboard_main.json
